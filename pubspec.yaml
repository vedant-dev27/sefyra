name: sefyra
description: Local Wi-Fi file transfer app.
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  uuid: ^4.5.3
  shared_preferences: ^2.5.4
  udp: ^5.0.3
  device_info_plus: ^12.3.0
  file_picker: ^10.3.10
  path_provider: ^2.1.5
  media_store_plus: ^0.1.3
  dynamic_color: ^1.8.1
  network_info_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  change_app_package_name: ^1.1.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/name/a.txt
    - assets/name/b.txt
  
flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon.png